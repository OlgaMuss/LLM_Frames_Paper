<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .subtitle { font: 600 16px Arial, Helvetica, sans-serif; fill: #111; }
      .label { font: 14px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #111; }
      .box { fill: #ffffff; stroke: #111; stroke-width: 2; rx: 10; }
      .note { fill: #f6f6f6; stroke: #111; stroke-width: 2; rx: 10; }
      .arrow { stroke: #111; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
      .dashed { stroke-dasharray: 6 6; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111" />
    </marker>
  </defs>

  <text x="30" y="38" class="title">Detect–correct–reverify loop</text>
  <text x="30" y="66" class="small">Candidates are repaired until they pass checks, or the system falls back on regression or budget exhaustion.</text>

  <!-- Main boxes -->
  <rect x="80" y="190" width="240" height="72" class="box" />
  <text x="100" y="220" class="label">Generate candidate</text>
  <text x="100" y="242" class="small">LLM proposes a response</text>

  <rect x="390" y="190" width="240" height="72" class="box" />
  <text x="410" y="220" class="label">Verify</text>
  <text x="410" y="242" class="small">Deterministic + statistical checks</text>

  <rect x="700" y="150" width="240" height="92" class="box" />
  <text x="720" y="182" class="label">Release</text>
  <text x="720" y="204" class="small">Verified output shown to students</text>
  <text x="720" y="226" class="small">Persist verified state</text>

  <rect x="700" y="280" width="240" height="92" class="box" />
  <text x="720" y="312" class="label">Repair</text>
  <text x="720" y="334" class="small">Targeted correction based on failures</text>
  <text x="720" y="356" class="small">Bounded iterations and time</text>

  <rect x="980" y="280" width="180" height="92" class="box" />
  <text x="1000" y="312" class="label">Fallback</text>
  <text x="1000" y="334" class="small">Pre-approved safe response</text>
  <text x="1000" y="356" class="small">Used when repair is unsafe</text>

  <!-- Arrows -->
  <path d="M 320 226 C 345 226, 360 226, 390 226" class="arrow" />

  <!-- Verify pass to release -->
  <path d="M 630 210 C 660 190, 675 182, 700 182" class="arrow" />
  <text x="642" y="182" class="small">pass</text>

  <!-- Verify fail to repair -->
  <path d="M 630 242 C 660 262, 675 280, 700 300" class="arrow" />
  <text x="642" y="286" class="small">fail</text>

  <!-- Repair back to verify -->
  <path d="M 820 280 C 820 255, 680 255, 630 245" class="arrow" />
  <text x="720" y="255" class="small">reverify</text>

  <!-- Non-regression / budget to fallback -->
  <path d="M 940 326 C 955 326, 965 326, 980 326" class="arrow" />
  <text x="902" y="316" class="small">regress or budget</text>

  <!-- Notes -->
  <rect x="80" y="320" width="520" height="120" class="note" />
  <text x="100" y="350" class="subtitle">Non-regression safeguard</text>
  <text x="100" y="374" class="small">Once a critical check passes, subsequent repairs must preserve it.</text>
  <text x="100" y="396" class="small">If a repair would break a previously passed critical property, the system falls back.</text>
  <text x="100" y="418" class="small">This prevents “fixing one issue by introducing another” on locked-in checks.</text>

  <path d="M 600 380 C 640 380, 660 358, 700 346" class="arrow dashed" />
</svg>

