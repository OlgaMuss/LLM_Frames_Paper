<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .subtitle { font: 600 16px Arial, Helvetica, sans-serif; fill: #111; }
      .label { font: 14px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #111; }
      .box { fill: #ffffff; stroke: #111; stroke-width: 2; rx: 10; }
      .phase { fill: #f6f6f6; stroke: #111; stroke-width: 2; rx: 14; }
      .arrow { stroke: #111; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111" />
    </marker>
  </defs>

  <text x="30" y="38" class="title">Three-phase reliability pipeline</text>
  <text x="30" y="66" class="small">Each model response is treated as a candidate and released only after verification or safe fallback.</text>

  <!-- Phase containers -->
  <rect x="30" y="100" width="360" height="380" class="phase" />
  <rect x="420" y="100" width="360" height="380" class="phase" />
  <rect x="810" y="100" width="360" height="380" class="phase" />

  <text x="50" y="132" class="subtitle">Before generation</text>
  <text x="440" y="132" class="subtitle">During generation</text>
  <text x="830" y="132" class="subtitle">After generation</text>

  <!-- Before generation boxes -->
  <rect x="60" y="160" width="300" height="66" class="box" />
  <text x="75" y="188" class="label">Prepare context</text>
  <text x="75" y="210" class="small">Retrieve materials, filter history, inject state</text>

  <rect x="60" y="245" width="300" height="66" class="box" />
  <text x="75" y="273" class="label">Analyse situation</text>
  <text x="75" y="295" class="small">Phase, intent, safeguards, policy signals</text>

  <rect x="60" y="330" width="300" height="90" class="box" />
  <text x="75" y="358" class="label">Circuit breakers (optional bypass)</text>
  <text x="75" y="380" class="small">High-severity triggers, off-topic redirects</text>
  <text x="75" y="402" class="small">Return predefined safe response when needed</text>

  <!-- During generation boxes -->
  <rect x="450" y="190" width="300" height="78" class="box" />
  <text x="465" y="220" class="label">Compose rules from frames</text>
  <text x="465" y="242" class="small">Merge policies by explicit priority</text>
  <text x="465" y="264" class="small">Define structured output schema</text>

  <rect x="450" y="295" width="300" height="90" class="box" />
  <text x="465" y="323" class="label">Generate candidate response</text>
  <text x="465" y="345" class="small">LLM produces structured output</text>
  <text x="465" y="367" class="small">Candidate is not shown to students yet</text>

  <!-- After generation boxes -->
  <rect x="840" y="160" width="300" height="80" class="box" />
  <text x="855" y="190" class="label">Verify</text>
  <text x="855" y="212" class="small">Deterministic checks (guarantees)</text>
  <text x="855" y="234" class="small">Statistical checks (calibrated judges)</text>

  <rect x="840" y="260" width="300" height="80" class="box" />
  <text x="855" y="290" class="label">Repair (bounded) and reverify</text>
  <text x="855" y="312" class="small">Targeted correction, non-regression enforced</text>
  <text x="855" y="334" class="small">Fallback on regression or budget exhaustion</text>

  <rect x="840" y="360" width="300" height="90" class="box" />
  <text x="855" y="388" class="label">Release and persist</text>
  <text x="855" y="410" class="small">Show verified output or safe fallback</text>
  <text x="855" y="432" class="small">Persist verified state; alert supervisors if warranted</text>

  <!-- Cross-phase arrows -->
  <path d="M 390 290 C 405 290, 410 290, 420 290" class="arrow" />
  <path d="M 780 290 C 795 290, 800 290, 810 290" class="arrow" />

  <text x="388" y="276" class="small">candidate</text>
</svg>

