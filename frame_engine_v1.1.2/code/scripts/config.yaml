# Configuration for the Rodin Frame Engine Prototype

# LLM configuration - provider-agnostic setup
llm:
  # Supported providers: "google", "openai", "anthropic", "azure"
  provider: "azure"
  
  # Model name (provider-specific)
  # Google: "gemini-2.5-flash-lite", "gemini-2.5-flash", "gemini-2.5-pro"
  # OpenAI: "gpt-4o", "gpt-4o-mini", "gpt-4-turbo"
  # Anthropic: "claude-sonnet-4-20250514", "claude-3-5-haiku-20241022"
  # Azure: "gpt-5 nano"
  model_name: "gpt-4.1-mini"


# Logging level for the application console.
# Determines the verbosity of the output.
# Options: "DEBUG", "INFO", "WARNING", "ERROR"
log_level: "INFO"

